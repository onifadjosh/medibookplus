<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MediBook+ | Secure Clinical Login</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
   



    <link href="tailwind.css" rel="stylesheet" />
    <link href="custom.css" rel="stylesheet" />
</head>

<body
    class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-md clinical-pattern">
  
    <main class="w-full max-w-[480px] z-10">
      
        <div class="flex flex-col items-center mb-xl">
            <div
                class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-on-primary text-[40px]">clinical_notes</span>
            </div>
            <h1 class="font-headline-md text-headline-md text-primary tracking-tight">MediBook+</h1>
            <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">MediBook+ Provider Portal</p>
        </div>
        <!-- Login Card -->
        <div
            class="glass-card rounded-2xl p-lg md:p-xl shadow-[0px_4px_15px_0px_rgba(0,0,0,0.05)] flex flex-col gap-lg">
            <div class="space-y-sm">
                <h2 class="font-title-lg text-title-lg text-on-surface">Welcome back</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your credentials to access the
                    secure terminal.</p>
            </div>
            <!-- Form -->
            <form class="flex flex-col gap-md" id="loginForm">
                <!-- Email Field -->
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                        <input
                            class="w-full pl-[48px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-md text-body-md"
                            id="email" name="email" placeholder="name@hospital.com" required="" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                        <input
                            class="w-full pl-[48px] pr-[48px] py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-md text-body-md"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors"
                            onclick="togglePassword()" type="button">
                            <span class="material-symbols-outlined" id="pw-toggle">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Secondary Actions -->
                <div class="flex items-center justify-between mt-xs">
                    <label class="flex items-center gap-sm cursor-pointer group">
                        <input
                            class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer"
                            type="checkbox" />
                        <span
                            class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember
                            Me</span>
                    </label>
                    <a class="font-label-md text-label-md text-primary hover:underline transition-all"
                        href="forgot_password_account_recovery.html">Forgot Password?</a>
                </div>
                <!-- Primary CTA -->
                <button class="w-full bg-primary text-on-primary py-md rounded-lg font-title-md text-title-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md"
                    type="submit">
                    <span class="">Sign In</span>
                    <span class="material-symbols-outlined text-[20px]">login</span>
                </button>
            </form>
            <!-- Biometrics & Divider -->
            <div class="relative flex py-sm items-center">
                <div class="flex-grow border-t border-outline-variant"></div>
                <span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline uppercase tracking-widest">or
                    login with</span>
                <div class="flex-grow border-t border-outline-variant"></div>
            </div>
            <div class="grid grid-cols-2 gap-md">
                <button
                    class="flex items-center justify-center gap-sm p-sm bg-surface-container-low border border-outline-variant rounded-lg hover:bg-surface-container-highest transition-colors active:scale-95 group">
                    <span
                        class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">email</span>
                    <span class="font-label-md text-label-md text-on-surface">Gmail</span>
                </button>
                <button class="flex items-center justify-center gap-sm p-sm bg-surface-container-low border border-outline-variant rounded-lg hover:bg-surface-container-highest transition-colors active:scale-95 group">
<svg class="w-5 h-5 fill-on-surface-variant group-hover:fill-primary transition-colors" viewBox="0 0 384 512" xmlns="http://www.w3.org/2000/svg">
<!-- Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. -->
<path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 24 184.8 15.6 273.7c-4 41.6 7.4 91.1 27.1 129.9 20.9 40.9 74.4 143.4 116.1 143.4 37.6 0 51-24.6 96.3-24.6 44.9 0 57.7 24.6 96.3 24.6 43.6 0 97.4-100.8 119.3-146.9-58-31.5-75.1-92.6-72-131.4zM262 59.2C279.7 35.8 288.3 18.3 286.7 0 269.9 1 248.9 13.5 237.1 29.4c-10.4 14.1-20.9 33.5-18.3 52 18.2 2.7 41.5-8.2 43.2-22.2z"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Apple</span>
</button>
            </div>
        </div>
        <!-- Footer Footer -->
        <div class="mt-xl text-center flex flex-col gap-sm">
            <p class="font-body-sm text-body-sm text-on-surface-variant">
                New to MediBook+?
                <a class="text-primary font-title-md hover:underline decoration-2 ml-xs transition-all" href="register_role_selection_step_2.html">Create
                    an Account</a>
            </p>
            <div class="flex items-center justify-center gap-md text-outline text-[12px] mt-md">
                <a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
                <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                <a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
                <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                <a class="hover:text-on-surface transition-colors" href="#">HIPAA Compliance</a>
            </div>
        </div>
    </main>
    <!-- Background Elements -->
    <div class="fixed top-0 right-0 w-1/3 h-1/3 opacity-30 pointer-events-none">
    </div>
    <div
        class="fixed bottom-0 left-0 w-1/4 h-1/4 opacity-20 pointer-events-none blur-3xl bg-primary-container rounded-full translate-x-[-20%] translate-y-[20%]">
    </div>

    <script src="scripts.js"></script>
</body>

</html>
