<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>MediBook+ | Admin Secure Login</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="../public/tailwind.css" rel="stylesheet" />
    <link href="../public/custom.css" rel="stylesheet" />
</head>

<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-md clinical-pattern">
  
    <main class="w-full max-w-[480px] z-10">
      
        <div class="flex flex-col items-center mb-xl">
            <div
                class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
                <span class="material-symbols-outlined text-on-primary text-[40px]">admin_panel_settings</span>
            </div>
            <h1 class="font-headline-md text-headline-md text-primary tracking-tight">MediBook+</h1>
            <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">Administrator Portal</p>
        </div>
        <!-- Login Card -->
        <div
            class="glass-card rounded-2xl p-lg md:p-xl shadow-[0px_4px_15px_0px_rgba(0,0,0,0.05)] flex flex-col gap-lg">
            <div class="space-y-sm">
                <h2 class="font-title-lg text-title-lg text-on-surface">Admin Access</h2>
                <p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your credentials to access the hospital management dashboard.</p>
            </div>
            <!-- Form -->
            <form class="flex flex-col gap-md" id="adminLoginForm">
                <!-- Email Field -->
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="email">Admin Email</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
                        <input
                            class="w-full pl-[48px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-md text-body-md"
                            id="email" name="email" placeholder="admin@medibook.plus" required="" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
                    <div class="relative group">
                        <span
                            class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
                        <input
                            class="w-full pl-[48px] pr-[48px] py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-md text-body-md"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors"
                            onclick="togglePassword()" type="button">
                            <span class="material-symbols-outlined" id="pw-toggle">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Secondary Actions -->
                <div class="flex items-center justify-between mt-xs">
                    <label class="flex items-center gap-sm cursor-pointer group">
                        <input
                            class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer"
                            type="checkbox" />
                        <span
                            class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
                    </label>
                    <a class="font-label-md text-label-md text-primary hover:underline transition-all"
                        href="../public/forgot_password_account_recovery.html">Forgot Password?</a>
                </div>
                <!-- Primary CTA -->
                <button class="w-full bg-primary text-on-primary py-md rounded-lg font-title-md text-title-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md"
                    type="submit" id="submitBtn">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-[20px]">login</span>
                </button>
            </form>
            
        </div>
        <!-- Footer Footer -->
        <div class="mt-xl text-center flex flex-col gap-sm">
            
            <div class="flex items-center justify-center gap-md text-outline text-[12px] mt-md">
                <a class="hover:text-on-surface transition-colors" href="#">System Status</a>
                <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                <a class="hover:text-on-surface transition-colors" href="#">Security Policies</a>
                <span class="w-1 h-1 bg-outline-variant rounded-full"></span>
                <a class="hover:text-on-surface transition-colors" href="#">Help Desk</a>
            </div>
        </div>
    </main>
    <!-- Background Elements -->
    <div class="fixed top-0 right-0 w-1/3 h-1/3 opacity-30 pointer-events-none">
    </div>
    <div
        class="fixed bottom-0 left-0 w-1/4 h-1/4 opacity-20 pointer-events-none blur-3xl bg-primary rounded-full translate-x-[-20%] translate-y-[20%]">
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const pwToggle = document.getElementById('pw-toggle');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                pwToggle.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                pwToggle.textContent = 'visibility';
            }
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[20px]">sync</span> Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                btn.innerHTML = '<span class="material-symbols-outlined text-[20px]">check_circle</span> Verified';
                setTimeout(() => {
                    window.location.href = 'admin_hospital_management_dashboard.html';
                }, 1000);
            }, 1500);
        });
    </script>
</body>

</html>
