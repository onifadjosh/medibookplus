<style>
        .clinical-pattern {
            background-color: #f6faf9;
            background-image: radial-gradient(#006767 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            background-opacity: 0.05;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-md clinical-pattern">
<!-- Login Shell -->
<main class="w-full max-w-[480px] z-10">
<!-- Brand Header (Simplified for Login) -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-md shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-on-primary text-[40px]">clinical_notes</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary tracking-tight">MediBook+</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">MediBook+ Provider Portal</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-2xl p-lg md:p-xl shadow-[0px_4px_15px_0px_rgba(0,0,0,0.05)] flex flex-col gap-lg">
<div class="space-y-sm">
<h2 class="font-title-lg text-title-lg text-on-surface">Welcome back</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Please enter your credentials to access the secure terminal.</p>
</div>
<!-- Form -->
<form class="flex flex-col gap-md" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-[48px] pr-md py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-md text-body-md" id="email" name="email" placeholder="name@hospital.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-[48px] pr-[48px] py-sm bg-surface-container-lowest border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none font-body-md text-body-md" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="pw-toggle">visibility</span>
</button>
</div>
</div>
<!-- Secondary Actions -->
<div class="flex items-center justify-between mt-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20 cursor-pointer" type="checkbox">
<span class="font-label-md text-label-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember Me</span>
</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary text-on-primary py-md rounded-lg font-title-md text-title-md hover:bg-primary-container active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md" type="submit">
<span class="">Sign In</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Biometrics & Divider -->
<div class="relative flex py-sm items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-outline uppercase tracking-widest">or login with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm p-sm bg-surface-container-low border border-outline-variant rounded-lg hover:bg-surface-container-highest transition-colors active:scale-95 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">face</span>
<span class="font-label-md text-label-md text-on-surface">FaceID</span>
</button>
<button class="flex items-center justify-center gap-sm p-sm bg-surface-container-low border border-outline-variant rounded-lg hover:bg-surface-container-highest transition-colors active:scale-95 group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-primary transition-colors">fingerprint</span>
<span class="font-label-md text-label-md text-on-surface">TouchID</span>
</button>
</div>
</div>
<!-- Footer Footer -->
<div class="mt-xl text-center flex flex-col gap-sm">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                New to MediBook+? 
                <a class="text-primary font-title-md hover:underline decoration-2 ml-xs transition-all" href="#">Create an Account</a>
</p>
<div class="flex items-center justify-center gap-md text-outline text-[12px] mt-md">
<a class="hover:text-on-surface transition-colors" href="#">Terms of Service</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-on-surface transition-colors" href="#">Privacy Policy</a>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<a class="hover:text-on-surface transition-colors" href="#">HIPAA Compliance</a>
</div>
</div>
</main>
<!-- Background Elements -->
<div class="fixed top-0 right-0 w-1/3 h-1/3 opacity-30 pointer-events-none">

</div>
<div class="fixed bottom-0 left-0 w-1/4 h-1/4 opacity-20 pointer-events-none blur-3xl bg-primary-container rounded-full translate-x-[-20%] translate-y-[20%]"></div>
<script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('pw-toggle');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Form Submission Micro-interaction
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Authenticating...';
            
            // Simulating API delay
            setTimeout(() => {
                btn.classList.add('bg-tertiary-container');
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Verified';
                setTimeout(() => {
                    // In a real app, redirection happens here
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-tertiary-container');
                }, 1000);
            }, 1500);
        });

        // Atmospheric Micro-interactions: Floating Background Objects
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            const shell = document.querySelector('main');
            if (shell) {
                shell.style.transform = `translate(${moveX}px, ${moveY}px)`;
                shell.style.transition = 'transform 0.1s ease-out';
            }
        });
    </script>
